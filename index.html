<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musicplayer.studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="Logo.png" alt="MusicPlayer.Studio Logo" id="logo">
    </header>
    <h1>MusicPlayer.Studio</h1> <!-- Moved outside the header -->
    <div id="mainContent">
        <div id="currentSong">No song playing currently:</div>
        <input type="file" id="fileInput" accept="audio/*" multiple>
        <div id="dropZone">Drag and drop your files here!</div>
        <button id="playPauseButton" disabled>Play</button>
        <button id="loopButton">Loop: Off</button>
        <div id="timestamp">0:00</div> <!-- Timestamp element -->
        <h2>Playlist:</h2>
        <ul id="playlist"></ul>
    </div>
    <div id="pitchControl">
        <label for="pitchSlider">Pitch:</label>
        <input type="range" id="pitchSlider" min="0.5" max="1.5" step="0.1" value="1"> <!-- Adjusted step -->
        <span id="pitchLabel">1.00x</span>
    </div>
    <div id="volumeControl">
        <label for="volumeSlider">Volume:</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1"> <!-- Adjusted step -->
        <span id="volumeLabel">100%</span>
    </div>
    <footer>
        <div id="version">Version 3.20.1 Made by Brendan Vuu ❤️</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
