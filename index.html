<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musicplayer.studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="Logo.png" alt="MusicPlayer.Studio Logo" id="logo"> <!-- Add this line for the logo -->
        <h1>MusicPlayer.Studio</h1>
    </header>
    <div id="sidePanel">
        <button id="howToUseButton">How to use?</button>
        <div id="credits">Made by Brendan Vuu</div>
    </div>
    <div id="mainContent">
        <div id="currentSong">No song playing currently:</div> <!-- New element for current song name -->
        <input type="file" id="fileInput" accept="audio/*" multiple>
        <div id="dropZone">Drag and drop your files here!</div>
        <button id="playPauseButton" disabled>Play</button>
        <button id="loopButton">Loop: Off</button>
        <div id="timestamp">0:00</div>
        <h2>Playlist:</h2>
        <ul id="playlist"></ul>
    </div>
    <div id="pitchControl">
        <label for="pitchSlider">Pitch:</label>
        <input type="range" id="pitchSlider" min="0.5" max="1.5" step="0.01" value="1">
        <span id="pitchLabel">1.00</span>
    </div>
    <div id="volumeControl">
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        <span id="volumeLabel">100%</span>
    </div>
    <footer>
        <div id="version">Version 0.25.25 - 26</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
